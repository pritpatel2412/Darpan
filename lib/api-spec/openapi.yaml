openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Darpan — AI-Powered Government Procurement Fraud Detection API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenders
    description: Tender operations
  - name: contractors
    description: Contractor operations
  - name: rtis
    description: RTI application operations
  - name: dashboard
    description: Dashboard summary operations
  - name: search
    description: Global search operations
  - name: scan
    description: Scan trigger operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenders:
    get:
      operationId: listTenders
      tags: [tenders]
      summary: List flagged tenders
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: department
          schema: { type: string }
        - in: query
          name: minScore
          schema: { type: number }
        - in: query
          name: fraudType
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: sortBy
          schema: { type: string, enum: [score, value, date], default: score }
      responses:
        "200":
          description: List of tenders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderListResponse"

  /tenders/{id}:
    get:
      operationId: getTender
      tags: [tenders]
      summary: Get tender details with evidence
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Tender detail with evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenderDetail"
        "404":
          description: Not found

  /tenders/{id}/rti:
    post:
      operationId: generateRti
      tags: [tenders]
      summary: Generate RTI application for a tender
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Generated RTI application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RtiApplication"

  /contractors:
    get:
      operationId: listContractors
      tags: [contractors]
      summary: List contractor watchlist
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: List of contractors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractorListResponse"

  /contractors/{id}:
    get:
      operationId: getContractor
      tags: [contractors]
      summary: Get contractor details
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Contractor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractorDetail"
        "404":
          description: Not found

  /rtis:
    get:
      operationId: listRtis
      tags: [rtis]
      summary: List all RTI applications
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: status
          schema: { type: string, enum: [drafted, submitted, responded, appealed] }
      responses:
        "200":
          description: List of RTI applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RtiListResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/state-heatmap:
    get:
      operationId: getStateHeatmap
      tags: [dashboard]
      summary: Get state-wise fraud heatmap data
      responses:
        "200":
          description: State heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StateHeatmapEntry"

  /dashboard/department-leaderboard:
    get:
      operationId: getDepartmentLeaderboard
      tags: [dashboard]
      summary: Get department fraud leaderboard
      responses:
        "200":
          description: Department leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentLeaderboardEntry"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent fraud detection activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /rtis/{id}:
    get:
      operationId: getRti
      tags: [rtis]
      summary: Get a single RTI application by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: RTI application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RtiApplication"
        "404":
          description: Not found

  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search across tenders and contractors
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [all, tenders, contractors], default: all }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /scan:
    post:
      operationId: triggerScan
      tags: [scan]
      summary: Trigger a new procurement fraud scan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tender:
      type: object
      required: [id, tenderId, title, department, state, contractValue, fraudScore, fraudTier, fraudSignals, awardedTo, publishedAt, bidWindowDays]
      properties:
        id:
          type: integer
        tenderId:
          type: string
        title:
          type: string
        department:
          type: string
        state:
          type: string
        contractValue:
          type: number
        awardedValue:
          type: ["number", "null"]
        fraudScore:
          type: number
          description: "0-100 fraud confidence score"
        fraudTier:
          type: string
          enum: [critical, high, medium, low]
        fraudSignals:
          type: array
          items:
            type: string
        primarySignal:
          type: string
        awardedTo:
          type: string
        publishedAt:
          type: string
        bidWindowDays:
          type: integer
        priceRatio:
          type: ["number", "null"]
        source:
          type: string

    TenderListResponse:
      type: object
      required: [tenders, total, page, limit]
      properties:
        tenders:
          type: array
          items:
            $ref: "#/components/schemas/Tender"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    FraudSignalDetail:
      type: object
      required: [signalId, name, triggered, confidence, evidence]
      properties:
        signalId:
          type: string
        name:
          type: string
        triggered:
          type: boolean
        confidence:
          type: number
        evidence:
          type: string
        sourceUrl:
          type: ["string", "null"]
        weight:
          type: number

    TenderDetail:
      type: object
      required: [id, tenderId, title, department, state, contractValue, fraudScore, fraudTier, fraudSignals, awardedTo, publishedAt, bidWindowDays, evidencePackage]
      properties:
        id:
          type: integer
        tenderId:
          type: string
        title:
          type: string
        department:
          type: string
        state:
          type: string
        contractValue:
          type: number
        awardedValue:
          type: ["number", "null"]
        fraudScore:
          type: number
        fraudTier:
          type: string
          enum: [critical, high, medium, low]
        fraudSignals:
          type: array
          items:
            type: string
        primarySignal:
          type: string
        awardedTo:
          type: string
        publishedAt:
          type: string
        bidWindowDays:
          type: integer
        priceRatio:
          type: ["number", "null"]
        source:
          type: string
        eligibilityCriteria:
          type: string
        technicalSpecs:
          type: string
        numberOfBidders:
          type: integer
        allBidders:
          type: array
          items:
            type: string
        evidencePackage:
          $ref: "#/components/schemas/EvidencePackage"
        rtiStatus:
          type: ["string", "null"]

    EvidencePackage:
      type: object
      required: [executiveSummary, signalBreakdown, contractorProfile, priceComparison, legalProvisions, recommendedAction]
      properties:
        executiveSummary:
          type: string
        signalBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/FraudSignalDetail"
        contractorProfile:
          $ref: "#/components/schemas/ContractorProfile"
        priceComparison:
          $ref: "#/components/schemas/PriceComparison"
        legalProvisions:
          type: array
          items:
            type: string
        recommendedAction:
          type: string
        timelineAnomalies:
          type: array
          items:
            type: string

    ContractorProfile:
      type: object
      required: [name, cin, registrationDate, totalTendersWon, totalValue]
      properties:
        name:
          type: string
        cin:
          type: string
        registrationDate:
          type: string
        totalTendersWon:
          type: integer
        totalValue:
          type: number
        linkedEntities:
          type: array
          items:
            type: string
        winConcentration:
          type: ["number", "null"]

    PriceComparison:
      type: object
      required: [awardedPrice, marketPrice, ratio, sources]
      properties:
        awardedPrice:
          type: number
        marketPrice:
          type: number
        ratio:
          type: number
        unit:
          type: string
        sources:
          type: array
          items:
            type: string

    Contractor:
      type: object
      required: [id, name, cin, state, flaggedTenders, totalValue, riskScore]
      properties:
        id:
          type: integer
        name:
          type: string
        cin:
          type: string
        state:
          type: string
        registrationDate:
          type: string
        flaggedTenders:
          type: integer
        totalValue:
          type: number
        riskScore:
          type: number
        primarySignals:
          type: array
          items:
            type: string

    ContractorListResponse:
      type: object
      required: [contractors, total, page, limit]
      properties:
        contractors:
          type: array
          items:
            $ref: "#/components/schemas/Contractor"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ContractorDetail:
      type: object
      required: [id, name, cin, state, flaggedTenders, totalValue, riskScore, tenders]
      properties:
        id:
          type: integer
        name:
          type: string
        cin:
          type: string
        state:
          type: string
        registrationDate:
          type: string
        flaggedTenders:
          type: integer
        totalValue:
          type: number
        riskScore:
          type: number
        primarySignals:
          type: array
          items:
            type: string
        linkedEntities:
          type: array
          items:
            type: string
        directors:
          type: array
          items:
            type: string
        tenders:
          type: array
          items:
            $ref: "#/components/schemas/Tender"

    RtiApplication:
      type: object
      required: [id, tenderId, tenderTitle, department, status, questions, legalBasis, createdAt]
      properties:
        id:
          type: integer
        tenderId:
          type: string
        tenderTitle:
          type: string
        department:
          type: string
        pioName:
          type: string
        pioAddress:
          type: string
        status:
          type: string
          enum: [drafted, submitted, responded, appealed]
        questions:
          type: array
          items:
            type: string
        legalBasis:
          type: string
        evidenceSummary:
          type: string
        filingDate:
          type: ["string", "null"]
        responseDeadline:
          type: ["string", "null"]
        confirmationNumber:
          type: ["string", "null"]
        createdAt:
          type: string

    RtiListResponse:
      type: object
      required: [rtis, total, page, limit]
      properties:
        rtis:
          type: array
          items:
            $ref: "#/components/schemas/RtiApplication"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DashboardStats:
      type: object
      required: [tendersScannedToday, tendersScannedTotal, flaggedToday, flaggedTotal, fraudValueDetected, criticalCases, rtisFiled, statesCovered, lastScanTime]
      properties:
        tendersScannedToday:
          type: integer
        tendersScannedTotal:
          type: integer
        flaggedToday:
          type: integer
        flaggedTotal:
          type: integer
        fraudValueDetected:
          type: number
        criticalCases:
          type: integer
        rtisFiled:
          type: integer
        statesCovered:
          type: integer
        lastScanTime:
          type: string
        avgFraudScore:
          type: number

    StateHeatmapEntry:
      type: object
      required: [state, flaggedCount, fraudValue, avgScore]
      properties:
        state:
          type: string
        flaggedCount:
          type: integer
        fraudValue:
          type: number
        avgScore:
          type: number

    DepartmentLeaderboardEntry:
      type: object
      required: [department, flaggedCount, fraudValue, avgScore, topSignal]
      properties:
        department:
          type: string
        flaggedCount:
          type: integer
        fraudValue:
          type: number
        avgScore:
          type: number
        topSignal:
          type: string

    ActivityItem:
      type: object
      required: [id, type, message, tenderId, tenderTitle, score, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [detection, rti_filed, rti_responded, new_scan]
        message:
          type: string
        tenderId:
          type: string
        tenderTitle:
          type: string
        score:
          type: number
        state:
          type: string
        timestamp:
          type: string

    SearchResultItem:
      type: object
      required: [type, id, title, subtitle, score, href]
      properties:
        type:
          type: string
          enum: [tender, contractor]
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
        score:
          type: number
        fraudTier:
          type: string
        href:
          type: string

    SearchResponse:
      type: object
      required: [results, total, query]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
        total:
          type: integer
        query:
          type: string

    ScanRequest:
      type: object
      properties:
        states:
          type: array
          items:
            type: string
        count:
          type: integer
          default: 3

    ScannedTenderResult:
      type: object
      required: [tenderId, title, fraudScore, fraudTier, department, state, contractValue, isNew]
      properties:
        tenderId:
          type: string
        title:
          type: string
        fraudScore:
          type: number
        fraudTier:
          type: string
        department:
          type: string
        state:
          type: string
        contractValue:
          type: number
        isNew:
          type: boolean

    ScanResult:
      type: object
      required: [scannedCount, flaggedCount, newTenders, criticalFound, scanDurationMs, timestamp]
      properties:
        scannedCount:
          type: integer
        flaggedCount:
          type: integer
        newTenders:
          type: array
          items:
            $ref: "#/components/schemas/ScannedTenderResult"
        criticalFound:
          type: integer
        scanDurationMs:
          type: integer
        timestamp:
          type: string
