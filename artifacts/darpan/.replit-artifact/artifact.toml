kind = "web"
previewPath = "/"
title = "Darpan — Fraud Detection"
version = "1.0.0"
id = "artifacts/darpan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19643

[services.development]
run = "pnpm --filter @workspace/darpan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/darpan", "run", "build" ]
publicDir = "artifacts/darpan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19643"
BASE_PATH = "/"
